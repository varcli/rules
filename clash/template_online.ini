;==================================================
; 2. 设置节点分组标志位（纯净极简版）
;==================================================

; --- 基础策略组 ---
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇺🇸 美国自动`[]🇺🇸 美国节点`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; --- 地区策略组 ---
custom_proxy_group=🇺🇸 美国节点`select`[]🇺🇸 美国自动`(美国|US|United States)
custom_proxy_group=🇺🇸 美国自动`url-test`(美国|US|United States)`http://cp.cloudflare.com/generate_204`300,,50

; --- 合并后的核心策略组 ---
custom_proxy_group=🎥 媒体解锁`select`[]🚀 手动选择`[]🇺🇸 美国自动`[]🇺🇸 美国节点`[]♻️ 自动选择`.*
